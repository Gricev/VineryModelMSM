# BoT-SORT под детекцию ствола лозы (камера 1, тележка едет вдоль ряда).
# База — ultralytics/cfg/trackers/botsort.yaml; изменены только параметры под задачу.
# Почему BoT-SORT, а не ByteTrack: камера движется, gmc (компенсация движения камеры)
# заметно стабилизирует track_id для статичных стволов, проплывающих через кадр.

tracker_type: botsort

# Стартовать новый трек только при уверенной детекции — чтобы слабый дубль-бокс
# одного ствола НЕ порождал второй id (борьба с «задетектил ствол дважды»).
new_track_thresh: 0.5      # дефолт 0.25
track_high_thresh: 0.35    # дефолт 0.25 — чище первая стадия ассоциации

track_low_thresh: 0.1
match_thresh: 0.8

# Дольше держим «потерянный» ствол живым: лозу часто на несколько кадров закрывает
# листва/соседний куст — без этого id переоткрывается и нумерация дробится.
# 150 кадров ≈ 5.8 c при 26 fps — пережидаем длинные перекрытия, чтобы один ствол
# не распадался на несколько track_id (надёжнее счёт кустов без localizer).
track_buffer: 150          # дефолт 30

fuse_score: True

# Компенсация движения камеры — ключевое для тележки, едущей вдоль ряда.
gmc_method: sparseOptFlow

# ReID выключен (нужна отдельная модель/компьют). Если фрагментация id останется
# проблемой даже после дозбора данных — включить with_reid: True и подобрать model.
proximity_thresh: 0.5
appearance_thresh: 0.8
with_reid: False
model: auto